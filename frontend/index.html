<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>子曰工坊V2 — Pipeline Dashboard</title>
    <meta name="description" content="子曰工坊V2：PSD 分镜处理、文本识别与资产管理一站式工具。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar" id="navbar">
            <div class="navbar-inner">
                <div class="navbar-brand">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                    <span class="navbar-title">子曰工坊V2</span>
                </div>
                <div class="navbar-tabs">
                    <button class="nav-tab active" data-tab="storyboard">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                            <rect x="2" y="2" width="7" height="7" rx="1.5"/>
                            <rect x="11" y="2" width="7" height="7" rx="1.5"/>
                            <rect x="2" y="11" width="7" height="7" rx="1.5"/>
                            <rect x="11" y="11" width="7" height="7" rx="1.5"/>
                        </svg>
                        漫画分镜智能体
                    </button>
                    <button class="nav-tab" data-tab="director">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                            <rect x="2.5" y="3" width="15" height="10" rx="1.5"/>
                            <path d="M6 16h8"/>
                            <path d="M10 13v3"/>
                        </svg>
                        编导智能体
                    </button>
                    <button class="nav-tab" data-tab="settings">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                            <circle cx="10" cy="10" r="3"/>
                            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"/>
                        </svg>
                        设置
                    </button>
                </div>
            </div>
        </nav>

        <!-- Page Container -->
        <main class="page-container" id="pageContainer">
            <!-- Pages are rendered by JS -->
        </main>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
