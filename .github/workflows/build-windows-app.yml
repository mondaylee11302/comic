name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: desktop-latest
  RELEASE_TITLE: Latest Windows Build
  RELEASE_ASSET: Picslit2-windows-app.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview
          pip install fastapi uvicorn python-dotenv numpy opencv-python psd-tools python-multipart requests scikit-image "volcengine-python-sdk[ark]"

      - name: Build desktop app
        shell: pwsh
        run: |
          python scripts/build_windows_app.py

      - name: Package release zip
        shell: pwsh
        run: |
          if (Test-Path "dist/${env:RELEASE_ASSET}") {
            Remove-Item "dist/${env:RELEASE_ASSET}" -Force
          }
          Compress-Archive -Path "dist/Picslit2/*" -DestinationPath "dist/${env:RELEASE_ASSET}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Picslit2-windows-app
          path: dist/${{ env.RELEASE_ASSET }}

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags --force
          git tag -f $env:RELEASE_TAG $env:GITHUB_SHA
          git push origin "refs/tags/$env:RELEASE_TAG" --force

          $releaseNotes = @"
          自动构建的 Windows 桌面版。

          下载后请先解压整个压缩包，再双击其中的 Picslit2.exe。
          首次启动时只需要填写 API Key，其他参数已内置为预设值。
          "@

          if (gh release view $env:RELEASE_TAG 2>$null) {
            gh release edit $env:RELEASE_TAG --title $env:RELEASE_TITLE --notes $releaseNotes
            gh release upload $env:RELEASE_TAG "dist/$env:RELEASE_ASSET" --clobber
          } else {
            gh release create $env:RELEASE_TAG "dist/$env:RELEASE_ASSET" --title $env:RELEASE_TITLE --notes $releaseNotes
          }
